<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
        /* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    font-family: Arial, Helvetica, sans-serif;
    background: #fff0f6; /* soft pink */
    color: #333;
    text-align: center;
    padding: 50px 20px;
    position: relative;
    min-height: 100vh;
}

/* HEADER */
header {
    background-color: #d70f64;
    color: white;
    padding: 30px 20px;
    border-radius: 10px;
    margin-bottom: 40px;
    position: relative;
}

header big {
    font-size: 28px;
    font-weight: bold;
}

header hr {
    border: none;
    height: 2px;
    background-color: white;
    margin-top: 15px;
}

/* STRIPES DECORATION */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 80%;
    height: 4px;
    background: linear-gradient(90deg, #ffb3d1 0%, #d70f64 100%);
    left: 10%;
    border-radius: 2px;
}

body::before {
    top: 120px;
}

body::after {
    top: 160px;
}

/* TEXT */
body > b {
    display: block;
    margin-top: 30px;
    font-size: 22px;
    color: #d70f64;
    font-weight: bold;
}

body {
    font-size: 18px;
    line-height: 1.6;
}

    </style>
  </head>
  <body>
    <header>
      <big>Login to Foodpanda &copy;</big>
      <hr />
    </header>
    You are already logged <br />
    <b>Thank you for being with us.</b>
  </body>
</html>
